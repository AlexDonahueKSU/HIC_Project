<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">   
    <link rel="stylesheet" href="styles.css">
    <title>Spiral Contact</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg text-dark mb-5" style="background-color: #9853E0;">
        <div class="container">
                <img src="./images/Logo.svg" href="/index.html" alt="Logo">
                <a class="navbar-brand fs-1 fw-bold" href="/index.html">Spiral</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/games.html">Games</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/movies.html">Movies</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/shows.html">Shows</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about.html">About</a>
                </li>
                <li class="nav-item">
                     <a class="nav-link" href="/contact.html">Contact</a>
                </li>
                <div class="textbox">
                    <input type="text" class="form-control" id="exampleInput" placeholder="Search">
                </div>
            </ul>
        </div>
        </div>
    </nav>
<main>
    <div class="container">
        <div class="row gy-5">
            <div class="col">
                <div class="w-80 mx-auto border-bottom border-black border-2 mb-2">
                    <h1 class="fw-bold">Contact Us</h1>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row gy-5">
            <div class="col p-3"></div>
        </div>
    </div>
    <div class="container">
    <div class="card rounded-5 border-0 " style="background-color: #e04f62">
        <div class="container text-center">
            <div class="row">
                <div class="col col-md align-self-center" id="ContLeftCol">
                    Column
                </div>
                <div class="col col-lg" id="ConteftCol">
                    <div class="row">
                        <div class="col-lg align-items-center">
                            <div class="mb-3" style="padding-top: 10px;">
                                <label for="lastName" class="form-label">First Name</label>
                                <input type="email" class="form-control" id="feedbackForm" placeholder="Last">
                            </div>
                        </div>
                    <div class="col-lg">
                        <div class="mb-3" style="padding-top: 10px;">
                            <label for="firstName" class="form-label">Last Name</label>
                            <input type="email" class="form-control" id="feedbackForm" placeholder="First">
                        </div>
                    </div>
                </div>
                <div class="md-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="feedbackForm" placeholder="name@example.com">
                </div>
                <div class="mb-3" style="padding-top: 10px;">
                    <label for="feedbackBox" class="form-label">Feedback</label>
                    <textarea class="form-control" id="feedbackForm" rows="5"></textarea>
                </div>
                <div class="row justify-content-left gx-5">
                    <div class="col-auto">
                        <button type="button" class="btn btn-primary mb-3 p-2" id="formButton">Submit</button>
                        <span id="toggler" class="form-text" style="display: none; padding-left: 20px; font-weight: bold;">Thanks for your feedback
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    </div>
</main>
</body>
<script>
    const formButton = document.getElementById('formButton');
    function clickHandler() {
        const toggler = document.getElementById('toggler');
        console.log(toggler.style.display)
        if (toggler.style.display === "inline"){
            toggler.style.display = "none";
        }else{
            toggler.style.display = "inline";
        }
    }
    formButton.addEventListener('click', clickHandler);
</script>
</html>
