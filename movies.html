        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/games.html">Games</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/movies.html">Movies</a>

                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about.html">About</a>
                </li>
                <li class="nav-item">
                     <a class="nav-link" href="/contact.html">Contact</a>

                <div class="textbox">
                    <input type="text" class="form-control" id="exampleInput" placeholder="Search">
                </div>

        </div>
    </nav>
<main>
    <div class="container">
        <div class="row gy-5">
            <div class="col">
                
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row gy-5">
            <div class="col p-3">

            </div>
        </div>
    </div>
    <div class="horizontal-scroll-wrapper">
        <h1>Movie Reviews</h1>
        <p>Use the arrows to browse reviews</p>
        <div class="scroll-container scrollMenu" id="autoScroll">
            <!--Reviews-->
            <button type="button" class="movie-buttons scroll-item">
                <h3>Interstellar Review</h3>
                <img class="review-image" src="/images/interstellar.jpg" alt="Interstellar">
            </button>
            <button type="button" class="movie-buttons scroll-item">
                <h3>Sharknado</h3>
                <img class="review-image" src="/images/sharknado.jpeg" alt="Sharknado">
            </button>
            <button type="button" class="movie-buttons scroll-item">
                <h3>Spider-Man: Far From Home</h3>
                <img class="review-image" src="/images/spider-man-FFH.jpeg" alt="Spider-Man">
            </button>
            <button type="button" class="movie-buttons scroll-item">
                <h3>The Lord of the Rings Trilogy</h3>
                <img class="review-image" src="/images/LOTR-trilogy.jpg" alt="Lord of the Rings">
            </button>
        </div>
        <div class="scrollControl-button">
            <button id="slideLeft" type="button">← Previous</button>
            <button id="slideRight" type="button">Next →</button>
        </div>
    </div>
</main>
<footer class="bg-dark text-white pt-5 pb-4">
    <div class="container text-center text-md-left">
        <div class="row text-center text-md-left">
            <div class="col-md-3 col-lg-3 col-xl-3 mx-auto mt-3">
                <h5 class="text-uppercase mb-4 font-weight-bold alex-purple">Spiral</h5>
                <p>Giving sincere critique since 2026</p>
            </div>
            <div class="col-md-2 col-lg-2 col-xl-2 mx-auto mt-3">
                <h5 class="text-uppercase mb-4 font-weight-bold alex-purple">Career</h5>
                <p><a href="#" class="career" style="text-decoration: none;">Jobs</a></p>
                <p><a href="#" class="career" style="text-decoration: none;">Contact Us</a></p>
            </div>
        </div>
    </div>
</footer>
<script>
document.addEventListener("DOMContentLoaded", function(){
    const buttonRight = document.getElementById('slideRight');
    const buttonLeft = document.getElementById('slideLeft');
    const container = document.getElementById('autoScroll');

    const scrollAmount = 430;

    buttonRight.onclick = function() {
        container.scrollLeft += scrollAmount;
    };

    buttonLeft.onclick = function() {
        container.scrollLeft -= scrollAmount;
    };

    container.addEventListener('scroll', function(){
        buttonLeft.disabled = container.scrollLeft <= 0;
        buttonRight.disabled = container.scrollLeft >= container.scrollWidth - container.clientWidth;
    });

    buttonLeft.disabled = true;
});
</script>
</body>
</html>
